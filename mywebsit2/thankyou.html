<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You 🙏</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      overflow: hidden;
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: popUp 0.8s ease;
    }

    .namaskar {
      font-size: 4rem;
      animation: namaskarAnim 1.5s ease-in-out infinite alternate;
    }

    p {
      font-size: 1.2rem;
      max-width: 500px;
      text-align: center;
      margin-top: 1rem;
    }

    .home-btn {
      margin-top: 2rem;
      background-color: #ffb347;
      color: black;
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .home-btn:hover {
      background-color: #ffd194;
      transform: scale(1.1);
    }

    @keyframes fadeIn {
      from { opacity: 0 }
      to { opacity: 1 }
    }

    @keyframes popUp {
      0% { transform: scale(0.5); opacity: 0 }
      100% { transform: scale(1); opacity: 1 }
    }

    @keyframes namaskarAnim {
      from { transform: rotate(-10deg); }
      to { transform: rotate(10deg); }
    }
  </style>
</head>
<body>
  <div class="namaskar">🙏</div>
  <h1>Thank You!</h1>
  <p>Namaskar! Your message has been received. Soumyaranjan Jena will get back to you very soon. Until then, stay awesome! 😇</p>
  <button class="home-btn" onclick="window.location.href='index.html'">← Go to Home</button>
</body>
</html>
